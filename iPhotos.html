<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Photos – GRIT Conference 2023</title>
  <link rel="stylesheet" href="style.css">
  <style>

.nav {
      position: relative;
      display:flex;
      align-items:center;
      justify-content: space-between;
      gap: 16px;
      padding:8px 12px;
      height:auto;
    }
    .nav-toggle {
      display: none;
      background: transparent;
      border: none;
      font-size: 1.8rem;
      cursor: pointer;
      padding: 4px 8px;
    }

    .CITpicture {
      display: flex;
      align-items: center;
      justify-content: center;
      width: 44px;
      height: 44px;
      border-radius: 50%;
      background: #ffffff;
      box-shadow: 0 0 8px rgba(0, 0, 0, 0.15);
      margin-left: 16px;
    }

    .nav-links {
      display: flex;
      gap: 16px;
      flex-wrap: wrap;
      align-items: center;
      flex: 1;
      justify-content: center;
    }

    .nav-links a {
      color: var(--muted);
      font-weight: 500;
      padding: 8px 10px;
      border-radius: 10px;
    }
    
    .dropdown {
      position: relative;
    }
    .dropdown > button {
      background: transparent;
      border: 0;
      color: var(--muted);
      font: inherit;
      font-weight: 600;
      cursor: pointer;
      padding: 8px 10px;
      border-radius: 10px;
      display: inline-flex;
      align-items: center;
      gap: 6px;
    }
    
    .menu {
      position: absolute;
      top: calc(100%);
      left: 0;
      min-width: 220px;
      background: var(--panel);
      border: 1px solid rgba(255,255,255,.08);
      border-radius: 12px;
      padding: 8px;
      box-shadow: var(--shadow);
      display: none;
    }
    .menu a {
      display: block;
      padding: 10px 12px;
      border-radius: 8px;
      color: var(--muted);
    }
     
    .dropdown:focus-within .menu, .dropdown:hover .menu {
      display: block;
    }
    .hero {
      padding: 48px 0 20px;
      border-bottom: 1px solid rgba(255,255,255,.08);
      
    }
    .hero h1 {
      font-size: clamp(28px, 4.5vw, 44px);
      line-height: 1.1;
      margin: 0 0 10px;
    }
    .hero p {
      margin: 0;
      color: var(--muted);
    }
    .section {
      padding: 28px 0;
    }
    .grid {
      display: grid;
      gap: 14px;
    }
    .gallery {
      display: grid;
      gap: 14px;
      grid-template-columns: repeat(auto-fit, minmax(250px, 1fr));

    }
    .tile {
      background: var(--panel);
      border: 1px solid rgba(255,255,255,.08);
      border-radius: 12px;
      overflow: hidden;
      cursor: pointer;
      box-shadow: var(--shadow);
    }
    .tile img {
      width: 100%;
      height: 220px;
      object-fit: cover;
    }
    .tile figcaption {
      padding: 8px 10px;
      color: var(--muted);
      font-size: .95rem;
    }
    .lightbox {
      position: fixed;
      inset: 0;
      background: rgba(0,0,0,.6);
      backdrop-filter: blur(2px);
      display: none;
      align-items: center;
      justify-content: center;
      padding: 20px;
      z-index: 60;
    }
    .lightbox.open {
      display: flex;
    }
    .viewer {
      background: var(--panel-2);
      border: 1px solid rgba(255,255,255,.08);
      border-radius: 14px;
      box-shadow: var(--shadow);
      max-width: min(1000px, 92vw);
      width: 100%;
      padding: 10px;
      display: grid;
      gap: 10px;
    }
    .viewer .stage {
      position: relative;
      width: 100%;
      aspect-ratio: 16/9;
      border-radius: 8px;
      overflow: hidden;
    }
    .viewer .stage img {
      position: absolute;
      inset: 0;
      width: 100%;
      height: 100%;
      object-fit: contain;
      background: #0b1020;
    }
    .viewer .meta {
      display: flex;
      align-items: center;
      justify-content: center;
      color: white;
      font-size: .95rem;
    }
    .controls {
      position: absolute;
      top: 50%;
      transform: translateY(-50%);
      width: 100%;
      display: flex;
      justify-content: space-between;
      padding: 0 10px;
      pointer-events: none;
    }
    .btn {
      display: inline-flex;
      align-items: center;
      justify-content: center;
      padding: 10px 14px;
      border-radius: 10px;
      border: 1px solid rgba(255,255,255,.18);
      background: transparent;
      color: white;
      font-weight: 600;
      cursor: pointer;
      pointer-events: auto;
    }
    .btn:hover {
      background: rgba(255,255,255,.06);
    }
    .prev-btn, .next-btn {
      width: 40px;
      height: 40px;
      padding: 0;
      font-size: 1.2rem;
    }
    .close {
      position: absolute;
      top: 10px;
      right: 10px;
    }

    @media (max-width:768px){
      .nav {
        position: relative;
        display: flex;
        align-items: center;
        justify-content: flex-start;
        gap: 8px;
        padding: 6px 10px;
      }
      .nav-toggle {
        order: 3;
        display: block;
        margin-left: auto;
      }
      .nav-links {
        position: absolute;
        top: 100%;
        left: 0;
        right: 0;
        background: rgba(255, 255, 255, 0.97);
        flex-direction: column;
        align-items: flex-start;
        padding: 8px 16px 10px;
        gap: 6px;
        display: none;
        box-shadow: 0 8px 20px rgba(0, 0, 0, 0.15);
        z-index: 50;
      }
      .nav.nav-open .nav-links {
        display: flex;
      }
      .nav-links a, .dropdown > button {
        width: 100%;
        text-align: left;
        padding: 6px 0;
      }
      .brand-logo {
        order: 1;
      }
      .CITpicture {
        order: 2;
        display: flex;
        margin-left: 8px
      }

      .dropdown {
        width: 100%;
      }

      .dropdown > button {
        display: flex;
        justify-content: space-between;
        align-items: center;
      }
      .dropdown .menu {
        position: static;
        min-width: 0;
        box-shadow: none;
        border: none;
        background: transparent;
        padding: 0 0 4px 16px;
        border-radius: 0;
      }
      .dropdown .menu a {
        padding: 4px 0;
      }
    }
  </style>
</head>
<body>
  <div id="site-header"></div>
  <section class="hero">
    <div class="container">
      <h1>Photos</h1>
      <p>Scenes from GRIT of 2023: speakers, sessions, and student showcases.</p>
    </div>
  </section>

  <!-- Gallery of all photos from GRIT 2023 -->

  <main>
    <section class="section">
      <div class="container grid gallery">
        <figure class="tile" data-src="image1.png" data-caption="Opening Session"><img src="image1.png" alt="Opening Session"><figcaption>Opening Session</figcaption></figure>
        <figure class="tile" data-src="image2.png" data-caption="Keynote"><img src="image2.png" alt="Keynote"><figcaption>Keynote</figcaption></figure>
        <figure class="tile" data-src="image3.png" data-caption="Breakout Session"><img src="image3.png" alt="Breakout Session"><figcaption>Breakout Session</figcaption></figure>
        <figure class="tile" data-src="image4.png" data-caption="Vendor Hall"><img src="image4.png" alt="Vendor Hall"><figcaption>Vendor Hall</figcaption></figure>
        <figure class="tile" data-src="image5.png" data-caption="Panel Q&A"><img src="image5.png" alt="Panel Q&A"><figcaption>Panel Q&A</figcaption></figure>
        <figure class="tile" data-src="image6.png" data-caption="Workshops"><img src="image6.png" alt="Workshops"><figcaption>Workshops</figcaption></figure>
        <figure class="tile" data-src="image7.png" data-caption="Student Projects"><img src="image7.png" alt="Student Projects"><figcaption>Student Projects</figcaption></figure>
        <figure class="tile" data-src="image8.png" data-caption="Networking"><img src="image8.png" alt="Networking"><figcaption>Networking</figcaption></figure>
        <figure class="tile" data-src="image9.png" data-caption="Campus"><img src="image9.png" alt="Campus"><figcaption>Campus</figcaption></figure>
        <figure class="tile" data-src="image10.png" data-caption="Volunteers"><img src="image10.png" alt="Volunteers"><figcaption>Volunteers</figcaption></figure>
        <figure class="tile" data-src="image11.jpg" data-caption="Alumni"><img src="image11.jpg" alt="Alumni"><figcaption>Alumni</figcaption></figure>
        <figure class="tile" data-src="image12.png" data-caption="Team"><img src="image12.png" alt="Team"><figcaption>Team</figcaption></figure>
        <figure class="tile" data-src="image13.jpg" data-caption="Awards"><img src="image13.jpg" alt="Awards"><figcaption>Awards</figcaption></figure>
        <figure class="tile" data-src="image15.jpg" data-caption="Closing Session"><img src="image15.jpg" alt="Closing Session"><figcaption>Closing Session</figcaption></figure>
        <figure class="tile" data-src="image16.jpg" data-caption="Farewell"><img src="image16.jpg" alt="Farewell"><figcaption>Farewell</figcaption></figure>
      </div>
    </section>
  </main>

  <!-- Card interaction controls -->
  <div class="lightbox" id="lightbox" aria-hidden="true">
    <div class="viewer">
      <button class="btn close" id="closeBtn" aria-label="Close">Close</button>
      <div class="stage">
        <img id="lightImg" alt="" />
        <div class="controls">
          <button class="btn prev-btn" id="prevBtn" aria-label="Previous">←</button>
          <button class="btn next-btn" id="nextBtn" aria-label="Next">→</button>
        </div>
      </div>
      <div class="meta">
        <div id="lightCaption"></div>
      </div>
    </div>
  </div>

  <div id="site-footer"></div>
  <script src="loadLayout.js"></script> <!-- Import universal JS with header, footer, and year -->
  <script src="script.js"></script> <!-- Mobile nav menu and countdown code -->
</body>
</html>
