<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <title>Colleges – GRIT Conference 2026</title>
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <link href="style.css" rel="stylesheet" />
</head>
<style>

.nav {
      display:flex;
      align-items:center;
      justify-content:space-between;
      gap: 16px;
      padding:8px 12px;
      height:auto;
    }
    .nav-toggle {
      display: none;
      background: transparent;
      border: none;
      font-size: 1.8rem;
      cursor: pointer;
      padding: 4px 8px;
    }
    .nav-toggle:focus-visible {
      outline: 2px solid var(--primary);
      border-radius: 4px;
    }

    .CITpicture {
      display: flex;
      align-items: center;
      justify-content: center;
      width: 44px;
      height: 44px;
      border-radius: 50%;
      background: #ffffff;
      box-shadow: 0 0 8px rgba(0, 0, 0, 0.15);
      margin-left: 16px;
    }
    

    .nav-links {
      display: flex;
      gap: 16px;
      flex-wrap: wrap;
      align-items: center;
      flex: 1;
      justify-content: center;
    }
    .nav-links a {
      color: var(--muted);
      font-weight: 500;
      padding: 8px 10px;
      border-radius: 10px;
    }
    
    .dropdown {
      position: relative; 
    }
    .dropdown > button {
      background: transparent;
      border: 0;
      color: var(--muted);
      font: inherit;
      font-weight: 600;
      cursor: pointer;
      padding: 8px 10px;
      border-radius: 10px;
      display: inline-flex;
      align-items: center;
      gap: 6px;
    }
    
    .menu {
      position: absolute;
      top: calc(100%);
      left: 0;
      min-width: 220px;
      background: var(--panel);
      border: 1px solid rgba(255,255,255,.08);
      border-radius: 12px;
      padding: 8px;
      box-shadow: var(--shadow);
      display: none;
    }
    .menu a {
      display: block;
      padding: 10px 12px;
      border-radius: 8px;
      color: var(--muted);
    }
    
    .dropdown:focus-within .menu, .dropdown:hover .menu {
      display: block;
    }
    .hero {
      padding: 30px 0 60px;
      text-align: center;
      border-bottom: 1px solid rgba(255,255,255,.08);
    }
    .hero h1 {
      font-size: clamp(30px, 5vw, 50px);
      margin: 0;
      color: var(--accent);
    }
    .hero p {
      color: var(--muted);
      font-size: 1.1rem;
      max-width: 700px;
      margin: 12px auto 0;
    }
    .front-image {
      display: flex;
      justify-content: center;
      overflow: hidden;
    }
    .front-image img {
      height: auto;
      width: 85%;
      margin-top: 3%;
      border-radius: 15px;
    }
    .video-container {
      margin: 5px auto;
      text-align: center;
    }
    iframe {
      border-radius: 12px;
      border: 1px solid rgba(255,255,255,.08);
      box-shadow: var(--shadow);
    }
    .section {
      padding: 10px 0;
    }
    .section h2 {
      color: var(--accent);
      text-align: center;
    }
    .section p {
      color: var(--muted);
      max-width: 800px;
      margin: auto;
      text-align: center;
    }

  
    footer {
      margin-top: 11px;
      padding: 28px 0 22px;
      color: var(--muted);
      text-align: center;
    }

    @media (max-width:768px){
      .nav {
        position: relative;
        display: flex;
        align-items: center;
        justify-content: flex-start;
        gap: 8px;
        padding: 6px 10px;
      }
      .nav-toggle {
        order: 3;
        display: block;
        margin-left: auto;
      }
      .nav-links {
        position: absolute;
        top: 100%;
        left: 0;
        right: 0;
        background: rgba(255, 255, 255, 0.97);
        flex-direction: column;
        align-items: flex-start;
        padding: 8px 16px 10px;
        gap: 6px;
        display: none;
        box-shadow: 0 8px 20px rgba(0, 0, 0, 0.15);
        z-index: 50;
      }
      .nav.nav-open .nav-links {
        display: flex;
      }
      .nav-links a, .dropdown > button {
        width: 100%;
        text-align: left;
        padding: 6px 0;
      }
      .brand-logo {
        order: 1;
      }
      .CITpicture {
        order: 2;
        display: flex;
        margin-left: 8px
      }

      .dropdown {
        width: 100%;
      }

      .dropdown > button {
        display: flex;
        justify-content: space-between;
        align-items: center;
      }
      .dropdown .menu {
        position: static;
        min-width: 0;
        box-shadow: none;
        border: none;
        background: transparent;
        padding: 0 0 4px 16px;
        border-radius: 0;
      }
      .dropdown .menu a {
        padding: 4px 0;
      }
    }
  </style>
</head>
<body>
  <div id="site-header"></div>
  <section class="hero">
    <div class="container">
      <!-- Page in progress -->
      <h1>2026 Speakers</h1>
      <h3>Coming Soon!</h3>
    </div>
  </section>
  <div id="site-footer"></div>
  <script src="loadLayout.js"></script> <!-- Import universal JS with header, footer, and year -->
  <script src="script.js"></script> <!-- Mobile nav menu and countdown code -->
</body>
</html>
